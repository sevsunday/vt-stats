<!DOCTYPE html>
<html lang="en" data-theme="default" data-mode="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VT Stats — Documentation</title>
  <link rel="stylesheet" href="vendor/bootstrap/css/bootstrap.min.css">
  <link rel="stylesheet" href="vendor/bootstrap-icons/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/theme-system.css">
  <link rel="stylesheet" href="css/themes.css">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/vtstats-theme.css">
</head>
<body>

  <!-- Navbar. Three-zone layout: brand on the left, an Algolia-style search
       pill absolutely centered (desktop only), and the rest of the menu
       (Docs / Raw data / Theme / Mode) on the right. The desktop search pill
       sits outside the burger collapse so it stays visible at md+ widths;
       on mobile it falls back to a compact icon-button inside the menu. -->
  <nav class="navbar navbar-expand-md sticky-top border-bottom vt-docs-nav">
    <div class="container-fluid px-3 px-md-4 gap-2">
      <a class="navbar-brand fw-bold" href="index.html" style="color: var(--kb-text-primary); text-decoration: none;">
        <i class="bi bi-crosshair me-1" style="color: var(--kb-primary);"></i>VT Stats
      </a>

      <!-- Centered search trigger pill (desktop only). Absolutely positioned
           inside the sticky navbar so it floats at the viewport center
           regardless of left / right column widths, mirroring Bootstrap's
           own docs nav. Click or Cmd/Ctrl+K opens #docs-search-modal. -->
      <button type="button" class="vt-docs-search-pill d-none d-md-flex"
              id="docs-search-trigger" data-vt-docs-search-trigger
              title="Search the docs (Ctrl+K)" aria-label="Search the docs"
              aria-keyshortcuts="Control+K Meta+K">
        <i class="bi bi-search vt-docs-search-pill-icon" aria-hidden="true"></i>
        <span class="vt-docs-search-pill-label">Search the docs</span>
        <kbd class="vt-docs-search-pill-kbd">Ctrl K</kbd>
      </button>

      <!-- Burger (mobile only) -->
      <button class="vt-nav-icon-btn vt-navbar-toggler d-md-none ms-auto order-md-3" type="button"
              data-bs-toggle="collapse" data-bs-target="#topnav-collapse"
              aria-controls="topnav-collapse" aria-expanded="false" aria-label="Toggle navigation">
        <i class="bi bi-list"></i>
      </button>

      <!-- Collapsible menu. `flex-md-grow-0` disables Bootstrap's default
           `flex-grow: 1` on .navbar-collapse so on desktop it shrinks to its
           content width; `ms-md-auto` then pushes it to the right edge. -->
      <div class="collapse navbar-collapse flex-md-grow-0 ms-md-auto order-md-2" id="topnav-collapse">
        <div class="d-flex flex-column flex-md-row align-items-stretch align-items-md-center gap-2 vt-nav-menu">
          <a href="docs.html" class="vt-nav-icon-btn active" aria-current="page">
            <i class="bi bi-book me-1"></i>Docs
          </a>

          <!-- Mobile-only search trigger (desktop uses the centered pill above
               which is hidden via d-md-flex / d-none). -->
          <button type="button" class="vt-nav-icon-btn d-md-none"
                  data-vt-docs-search-trigger
                  title="Search the docs" aria-label="Search the docs">
            <i class="bi bi-search me-1"></i>Search
          </button>

          <a href="raw.html" class="vt-nav-icon-btn" title="Browse the raw per-match data (binpb, decoded JSON, processed JSON)">
            <i class="bi bi-code-square"></i><span class="vt-nav-label ms-2">Raw data</span>
          </a>

          <a href="odf/index.html" class="vt-nav-icon-btn"
             title="Browse the BZ2 Object Definition File (ODF) database"
             aria-label="ODF browser">
            <i class="bi bi-boxes"></i><span class="vt-nav-label ms-2">ODF</span>
          </a>

          <!-- Theme Dropdown -->
          <div class="dropdown">
            <button class="vt-nav-icon-btn" type="button" data-bs-toggle="dropdown" data-bs-auto-close="outside" title="Change theme" aria-label="Change theme">
              <i class="bi bi-palette"></i><span class="vt-nav-label ms-2">Theme</span>
            </button>
            <ul class="dropdown-menu dropdown-menu-end" data-theme-menu style="min-width: 260px;"></ul>
          </div>

          <!-- Mode Toggle -->
          <button class="vt-nav-icon-btn" data-mode-toggle title="Toggle light/dark mode" aria-label="Toggle light/dark mode">
            <i class="bi bi-sun-fill"></i>
            <span class="vt-nav-label ms-2 vt-nav-label--mode-dark">Dark mode</span>
            <span class="vt-nav-label ms-2 vt-nav-label--mode-light">Light mode</span>
          </button>
        </div>
      </div>
    </div>
  </nav>

  <!-- Documentation Content -->
  <div class="container-fluid docs-container px-3 px-md-4 py-4">

    <!-- Mobile TOC toggle (visible below lg) -->
    <div class="d-lg-none mb-3">
      <button class="btn btn-sm btn-outline-secondary w-100 d-flex align-items-center justify-content-between" type="button" data-bs-toggle="collapse" data-bs-target="#docs-toc-mobile" aria-expanded="false" aria-controls="docs-toc-mobile">
        <span><i class="bi bi-list-nested me-2"></i>On this page</span>
        <i class="bi bi-chevron-down"></i>
      </button>
      <div class="collapse mt-2" id="docs-toc-mobile">
        <nav id="docs-toc-mobile-nav" class="docs-toc docs-toc--mobile" aria-label="Table of contents"></nav>
      </div>
    </div>

    <div class="row">
      <!-- Sidebar TOC (visible at lg+) -->
      <div class="col-lg-3 d-none d-lg-block">
        <div class="docs-toc-sticky">
          <nav id="docs-toc" class="docs-toc" aria-label="Table of contents">
            <div class="docs-toc-progress"><div class="docs-toc-progress-bar"></div></div>
            <div class="docs-toc-title">On this page</div>
          </nav>
        </div>
      </div>

      <!-- Main content -->
      <div class="col-lg-9">
        <!-- Additional docs picker. Primary doc is DATA_DICTIONARY; others
             are standalone reference docs accessible via ?doc=<slug>. When
             more docs land, add them to the DOC_REGISTRY in the script below. -->
        <nav class="docs-picker mb-3 d-flex flex-wrap gap-2" id="docs-picker" aria-label="Additional docs"></nav>
        <div id="docs-loading" class="text-center py-5">
          <div class="spinner-border spinner-border-sm" style="color: var(--kb-primary);" role="status">
            <span class="visually-hidden">Loading...</span>
          </div>
          <span class="ms-2" style="color: var(--kb-text-muted);">Loading documentation&hellip;</span>
        </div>
        <article id="docs-content" class="docs-prose d-none"></article>
        <div id="docs-error" class="d-none">
          <div class="alert" style="background: var(--kb-bg-subtle); border: 1px solid var(--kb-border-subtle); color: var(--kb-text-primary);">
            <i class="bi bi-exclamation-triangle me-2" style="color: var(--kb-warning);"></i>
            <span id="docs-error-message">Failed to load documentation.</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Back to Top -->
  <button id="back-to-top" class="docs-back-to-top" title="Back to top" aria-label="Back to top">
    <i class="bi bi-arrow-up"></i>
  </button>

  <!-- Docs Search Modal. Trigger via #docs-search-trigger button, Cmd/Ctrl+K,
       or `/` (when no input has focus). Index built once after marked.parse()
       inside js/docs-search.js, cached in sessionStorage by content hash so
       subsequent navigations are zero-cost. -->
  <div class="modal fade vt-docs-search-modal" id="docs-search-modal"
       tabindex="-1" aria-labelledby="docs-search-modal-label" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-fullscreen-sm-down">
      <div class="modal-content">
        <div class="modal-header vt-docs-search-header">
          <i class="bi bi-search vt-docs-search-icon" aria-hidden="true"></i>
          <input type="search" id="docs-search-input"
                 class="form-control vt-docs-search-input"
                 placeholder="Search the docs..."
                 aria-label="Search the docs"
                 aria-controls="docs-search-results"
                 aria-autocomplete="list"
                 autocomplete="off" spellcheck="false">
          <span id="docs-search-modal-label" class="visually-hidden">Search documentation</span>
          <span id="docs-search-count" class="vt-docs-search-count" aria-live="polite"></span>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body vt-docs-search-body">
          <ul id="docs-search-results" class="vt-docs-search-results" role="listbox"
              aria-label="Search results"></ul>
        </div>
        <div class="modal-footer vt-docs-search-footer">
          <span class="vt-docs-search-legend">
            <kbd>↑</kbd><kbd>↓</kbd> navigate
            <span class="vt-docs-search-sep">·</span>
            <kbd>↵</kbd> jump
            <span class="vt-docs-search-sep">·</span>
            <kbd>Esc</kbd> close
          </span>
        </div>
      </div>
    </div>
  </div>

  <script src="vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
  <script src="vendor/marked/marked.min.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/docs-search.js"></script>
  <script>
    // Registry of available docs pages. The default (dictionary) is the main
    // technical spec; the other entries are standalone references linked from
    // rules and the developer guide. Add a row here when a new standalone doc
    // needs to be surfaced from docs.html. Slugs are case-insensitive.
    const DOC_REGISTRY = [
      { slug: 'dictionary', file: 'docs/DATA_DICTIONARY.md', label: 'Data Dictionary', icon: 'bi-journal-text' },
    ];

    (async function () {
      const content = document.getElementById('docs-content');
      const loading = document.getElementById('docs-loading');
      const error = document.getElementById('docs-error');
      const errorMsg = document.getElementById('docs-error-message');
      const picker = document.getElementById('docs-picker');

      // Pick active doc from ?doc=<slug>; fall back to dictionary.
      const params = new URLSearchParams(location.search);
      const wanted = (params.get('doc') || 'dictionary').toLowerCase();
      const active = DOC_REGISTRY.find(d => d.slug === wanted) || DOC_REGISTRY[0];

      // Render picker tabs. Hidden when only one doc is registered.
      if (DOC_REGISTRY.length > 1) {
        DOC_REGISTRY.forEach(d => {
          const a = document.createElement('a');
          a.href = d.slug === DOC_REGISTRY[0].slug ? 'docs.html' : `docs.html?doc=${d.slug}`;
          a.className = 'vt-nav-icon-btn' + (d.slug === active.slug ? ' active' : '');
          a.innerHTML = `<i class="bi ${d.icon} me-1"></i>${d.label}`;
          if (d.slug === active.slug) a.setAttribute('aria-current', 'page');
          picker.appendChild(a);
        });
      }

      try {
        const res = await fetch(active.file);
        if (!res.ok) throw new Error(res.statusText);
        const md = await res.text();

        content.innerHTML = marked.parse(md);

        // Post-render: style tables
        content.querySelectorAll('table').forEach(t => {
          t.classList.add('table', 'table-sm', 'table-hover', 'table-striped', 'align-middle');
          if (!t.parentElement.classList.contains('table-responsive')) {
            const wrapper = document.createElement('div');
            wrapper.className = 'table-responsive';
            t.parentNode.insertBefore(wrapper, t);
            wrapper.appendChild(t);
          }
        });

        // Post-render: style code blocks
        content.querySelectorAll('pre > code').forEach(block => {
          block.parentElement.classList.add('docs-code-block');
        });

        // Post-render: assign heading IDs and inject anchor links
        function slugify(text) {
          return text.toLowerCase().replace(/[^\w\s-]/g, '').replace(/\s+/g, '-').replace(/-+/g, '-').replace(/^-|-$/g, '');
        }

        const usedIds = new Set();
        content.querySelectorAll('h1, h2, h3, h4').forEach(heading => {
          let id = slugify(heading.textContent);
          if (usedIds.has(id)) {
            let n = 2;
            while (usedIds.has(id + '-' + n)) n++;
            id = id + '-' + n;
          }
          usedIds.add(id);
          heading.id = id;

          if (heading.tagName !== 'H1') {
            const anchor = document.createElement('a');
            anchor.className = 'docs-heading-anchor';
            anchor.href = '#' + id;
            anchor.setAttribute('aria-label', 'Link to ' + heading.textContent);
            anchor.innerHTML = '<i class="bi bi-link-45deg"></i>';
            heading.appendChild(anchor);
          }
        });

        // Build collapsible TOC from h2 and h3 elements
        function buildToc(container) {
          const list = document.createElement('ul');
          list.className = 'docs-toc-list';
          let currentH2Item = null;
          let currentSubList = null;

          content.querySelectorAll('h2, h3').forEach(heading => {
            if (heading.tagName === 'H2') {
              const li = document.createElement('li');
              li.className = 'docs-toc-section';

              const row = document.createElement('div');
              row.className = 'docs-toc-h2-row';

              const a = document.createElement('a');
              a.href = '#' + heading.id;
              a.className = 'docs-toc-link docs-toc-link--h2';
              a.textContent = heading.textContent.replace(/\s*$/, '');
              a.dataset.target = heading.id;

              row.appendChild(a);
              li.appendChild(row);
              list.appendChild(li);
              currentH2Item = li;
              currentSubList = null;
            } else {
              if (!currentSubList) {
                currentSubList = document.createElement('ul');
                currentSubList.className = 'docs-toc-sublist';
                if (currentH2Item) {
                  currentH2Item.appendChild(currentSubList);
                  const chevron = document.createElement('button');
                  chevron.className = 'docs-toc-chevron';
                  chevron.setAttribute('aria-label', 'Toggle subsections');
                  chevron.innerHTML = '<i class="bi bi-chevron-right"></i>';
                  currentH2Item.querySelector('.docs-toc-h2-row').prepend(chevron);
                } else {
                  list.appendChild(currentSubList);
                }
              }
              const li = document.createElement('li');
              const a = document.createElement('a');
              a.href = '#' + heading.id;
              a.className = 'docs-toc-link docs-toc-link--h3';
              a.textContent = heading.textContent.replace(/\s*$/, '');
              a.dataset.target = heading.id;
              li.appendChild(a);
              currentSubList.appendChild(li);
            }
          });

          container.appendChild(list);

          // Chevron toggle behavior
          container.querySelectorAll('.docs-toc-chevron').forEach(btn => {
            btn.addEventListener('click', e => {
              e.stopPropagation();
              const section = btn.closest('.docs-toc-section');
              const wasOpen = section.classList.contains('docs-toc-section--open');
              if (!wasOpen) {
                container.querySelectorAll('.docs-toc-section--open').forEach(s => {
                  if (s !== section) s.classList.remove('docs-toc-section--open');
                });
              }
              section.classList.toggle('docs-toc-section--open');
            });
          });
        }

        const tocDesktop = document.getElementById('docs-toc');
        const tocMobile = document.getElementById('docs-toc-mobile-nav');
        buildToc(tocDesktop);
        buildToc(tocMobile);

        // Initialize the client-side search (modal palette + Cmd/Ctrl+K).
        // Index is built once over the rendered DOM, cached in sessionStorage
        // by content hash. See js/docs-search.js for the architecture.
        if (window.VTDocsSearch && typeof window.VTDocsSearch.init === 'function') {
          window.VTDocsSearch.init({
            content: content,
            slug: active.slug,
            raw: md
          });
        }

        // Expand a TOC section by its heading id (used by scroll-spy)
        function expandSectionForId(targetId) {
          document.querySelectorAll('.docs-toc').forEach(toc => {
            const link = toc.querySelector('.docs-toc-link[data-target="' + targetId + '"]');
            if (!link) return;
            const section = link.closest('.docs-toc-section');
            if (!section) return;
            if (!section.classList.contains('docs-toc-section--open')) {
              toc.querySelectorAll('.docs-toc-section--open').forEach(s => {
                if (s !== section) s.classList.remove('docs-toc-section--open');
              });
              section.classList.add('docs-toc-section--open');
            }
          });
        }
        // Expose for cross-module callers (notably js/docs-search.js, which
        // calls this after a search-result jump so the parent TOC section
        // expands and the IntersectionObserver-driven highlight catches up).
        window.expandSectionForId = expandSectionForId;

        // Scroll-spy via IntersectionObserver
        const allTocLinks = document.querySelectorAll('.docs-toc-link');
        const headingEls = content.querySelectorAll('h2, h3');
        let activeId = null;

        const observer = new IntersectionObserver(entries => {
          const visible = entries.filter(e => e.isIntersecting).sort((a, b) => a.boundingClientRect.top - b.boundingClientRect.top);
          if (visible.length > 0) {
            const newId = visible[0].target.id;
            if (newId !== activeId) {
              activeId = newId;
              allTocLinks.forEach(link => {
                const isActive = link.dataset.target === activeId;
                link.classList.toggle('docs-toc-link--active', isActive);
              });
              // Also highlight the parent H2 when a child H3 is active
              document.querySelectorAll('.docs-toc-section').forEach(sec => {
                const h2Link = sec.querySelector('.docs-toc-link--h2');
                const hasActiveChild = sec.querySelector('.docs-toc-link--active');
                sec.classList.toggle('docs-toc-section--active', !!hasActiveChild || (h2Link && h2Link.dataset.target === activeId));
              });
              expandSectionForId(activeId);
            }
          }
        }, { rootMargin: '-60px 0px -75% 0px', threshold: 0 });

        headingEls.forEach(h => observer.observe(h));

        // Smooth scroll for TOC links
        document.querySelectorAll('.docs-toc-link, .docs-heading-anchor').forEach(a => {
          a.addEventListener('click', e => {
            e.preventDefault();
            const targetId = a.getAttribute('href').slice(1);
            const target = document.getElementById(targetId);
            if (target) {
              const offset = 70;
              const y = target.getBoundingClientRect().top + window.scrollY - offset;
              window.scrollTo({ top: y, behavior: 'smooth' });
              history.replaceState(null, '', '#' + targetId);
            }
            const mobileCollapse = document.getElementById('docs-toc-mobile');
            if (mobileCollapse && mobileCollapse.classList.contains('show')) {
              bootstrap.Collapse.getOrCreateInstance(mobileCollapse).hide();
            }
          });
        });

        loading.classList.add('d-none');
        content.classList.remove('d-none');

        // Jump to hash on load
        if (location.hash) {
          const target = document.getElementById(location.hash.slice(1));
          if (target) {
            setTimeout(() => {
              const y = target.getBoundingClientRect().top + window.scrollY - 70;
              window.scrollTo({ top: y, behavior: 'smooth' });
            }, 100);
          }
        }
      } catch (e) {
        loading.classList.add('d-none');
        error.classList.remove('d-none');
        errorMsg.textContent = `Failed to load ${active.file}.`;
        console.error('Failed to load documentation:', e);
      }

      // Back-to-top button + scroll progress bar
      const btn = document.getElementById('back-to-top');
      const progressBars = document.querySelectorAll('.docs-toc-progress-bar');
      let ticking = false;

      window.addEventListener('scroll', () => {
        if (!ticking) {
          requestAnimationFrame(() => {
            btn.classList.toggle('docs-back-to-top--visible', window.scrollY > 400);
            const scrollMax = document.documentElement.scrollHeight - window.innerHeight;
            const pct = scrollMax > 0 ? Math.min(100, (window.scrollY / scrollMax) * 100) : 0;
            progressBars.forEach(bar => { bar.style.width = pct + '%'; });
            ticking = false;
          });
          ticking = true;
        }
      }, { passive: true });

      btn.addEventListener('click', () => {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    })();
  </script>
</body>
</html>
