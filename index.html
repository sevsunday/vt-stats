<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VT Stats Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

  <!-- Navbar / Match Selector -->
  <nav class="navbar navbar-expand-sm sticky-top border-bottom">
    <div class="container-fluid">
      <span class="navbar-brand fw-bold">VT Stats</span>
      <div class="d-flex align-items-center gap-3">
        <select id="match-select" class="form-select form-select-sm" style="width: auto;"></select>
      </div>
    </div>
  </nav>

  <!-- Loading Spinner -->
  <div id="loading">
    <div class="d-flex flex-column align-items-center justify-content-center" style="min-height: 60vh;">
      <div class="spinner-border text-info mb-3" role="status" style="width: 3rem; height: 3rem;">
        <span class="visually-hidden">Loading...</span>
      </div>
      <p class="text-secondary">Loading match data&hellip;</p>
    </div>
  </div>

  <!-- Dashboard Content (hidden until data loads) -->
  <div id="dashboard" class="container-fluid px-3 px-md-4 py-4 d-none">

    <!-- Match Info Banner -->
    <div id="match-info" class="card mb-4">
      <div class="card-body d-flex flex-wrap gap-4 align-items-center">
        <div><span class="text-secondary small">Map</span><br><strong id="info-map">—</strong></div>
        <div><span class="text-secondary small">Date</span><br><strong id="info-date">—</strong></div>
        <div><span class="text-secondary small">Duration</span><br><strong id="info-duration">—</strong></div>
        <div><span class="text-secondary small">Players</span><br><strong id="info-players">—</strong></div>
      </div>
    </div>

    <!-- Leaderboard -->
    <div class="card mb-4">
      <div class="card-header"><h5 class="mb-0">Player Leaderboard</h5></div>
      <div class="card-body table-responsive">
        <table id="leaderboard" class="table table-hover align-middle mb-0">
          <thead>
            <tr>
              <th>#</th>
              <th data-sort="name">Player</th>
              <th data-sort="dealt" class="text-end">Damage Dealt</th>
              <th data-sort="received" class="text-end">Damage Received</th>
              <th data-sort="net" class="text-end">Net Damage</th>
              <th data-sort="ratio" class="text-end">Ratio</th>
              <th data-sort="favWeapon">Favorite Weapon</th>
              <th data-sort="weaponCount" class="text-end">Weapons Used</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <!-- Row 2: Timeline + Weapon Meta -->
    <div class="row g-4 mb-4">
      <div class="col-lg-7">
        <div class="card h-100">
          <div class="card-header"><h5 class="mb-0">Combat Timeline</h5></div>
          <div class="card-body">
            <canvas id="timeline-chart"></canvas>
          </div>
        </div>
      </div>
      <div class="col-lg-5">
        <div class="card h-100">
          <div class="card-header"><h5 class="mb-0">Weapon Meta</h5></div>
          <div class="card-body">
            <canvas id="weapon-meta-chart"></canvas>
          </div>
        </div>
      </div>
    </div>

    <!-- Rivalry Heatmap -->
    <div class="card mb-4">
      <div class="card-header"><h5 class="mb-0">Rivalry Heatmap</h5></div>
      <div class="card-body table-responsive">
        <table id="heatmap" class="table table-sm align-middle text-center mb-0"></table>
      </div>
    </div>

    <!-- Row 4: Per-Player Weapons + Top Rivalries -->
    <div class="row g-4 mb-4">
      <div class="col-lg-7">
        <div class="card h-100">
          <div class="card-header"><h5 class="mb-0">Per-Player Weapon Breakdown</h5></div>
          <div class="card-body">
            <canvas id="player-weapons-chart"></canvas>
          </div>
        </div>
      </div>
      <div class="col-lg-5">
        <div class="card h-100">
          <div class="card-header"><h5 class="mb-0">Top Rivalries</h5></div>
          <div class="card-body" id="rivalries-container"></div>
        </div>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script src="js/dataProcessor.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
