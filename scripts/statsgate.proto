edition = "2023";

import "google/protobuf/timestamp.proto";

package statsgate;

message Vec3 {
  float x = 1;
  float y = 2;
  float z = 3;
}

message StatHeader {
  string map = 1;
  google.protobuf.Timestamp start_time = 2;
  string author_nickname = 3;
  uint64 author_steam64 = 4;
  uint32 tick_rate = 5;
  map<uint32, uint64> teamnum_to_s64 = 6;
  map<uint32, string> teamnum_to_nick = 7;
  repeated int32 team_1 = 8;
  repeated int32 team_2 = 9;
  string active_config_mod = 10;
}

message BulletInit {
  uint32 tick = 1;
  int32 shooter = 2;
  string ordnance_odf = 3;
}

message BulletHit {
  uint32 tick = 1;
  int32 shooter = 2;
  string ordnance_odf = 3;
}

message DamageDealt {
  uint32 tick = 1;
  int32 shooter = 2;
  int32 team = 3;
  string ordnance_odf = 4;
  float amount = 5;
}

message DamageReceived {
  uint32 tick = 1;
  int32 victim = 2;
  int32 team = 3;
  string ordnance_odf = 4;
  float amount = 5;
}

message PlayerState {
  int32 player = 1;
  Vec3 position = 2;
  float speed = 3;
}

message UpdateTick {
  uint32 tick = 1;
  repeated PlayerState players = 2;
}

message StatEvent {
  oneof event_type {
    BulletInit bullet_init = 1;
    BulletHit bullet_hit = 2;
    DamageDealt damage_dealt = 3;
    DamageReceived damage_received = 4;
    // UpdateTick update_tick = 5;
  }
}

message ClientStatSession {
  StatHeader header = 1;
  repeated StatEvent event_stream = 2;
}
