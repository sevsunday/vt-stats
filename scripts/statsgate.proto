edition = "2023";

import "google/protobuf/timestamp.proto";

package statsgate;

message Vec3 {
  float x = 1;
  float y = 2;
  float z = 3;
}

// Important notes:

// Players are identified by their steam64 id.
//
// Anything with a `team` refers to the team slot
// from 1-10, NOT the teamplay team.
// Team 1 is teams 1-5, Team 2 is teams 6-10

message StatHeader {
  string map = 1;
  google.protobuf.Timestamp start_time = 2;
  string author_nickname = 3;
  uint64 author_steam64 = 4;
  uint32 tick_rate = 5;
  map<uint64, string> s64_to_nick = 6;
  map<int32, uint64> teamnum_to_s64 = 7;
  string active_config_mod = 8;
  map<uint64, int32> s64_to_teamnum = 9;
  uint32 player_count = 10;
  uint32 last_tick = 11;
  float terrain_min_x = 12;
  float terrain_max_x = 13;
  float terrain_min_y = 14;
  float terrain_max_y = 15;
  float terrain_min_z = 16;
  float terrain_max_z = 17;
}

// As of now these events only track player shots

message BulletInit {
  uint32 tick = 1;
  uint64 shooter = 2;
  string ordnance_odf = 3;
}

// Either shooter or victim must be a player for this event to be recorded right now,
// but if there is interest in AI vs AI hits we can implement that
message BulletHit {
  uint32 tick = 1;
  uint64 shooter = 2; // undefined if not a player
  string ordnance_odf = 3;
  uint64 victim = 4; // undefined if not a player
  string victim_odf = 5;
  string shooter_odf = 6;
}

// Note on damage messages: shooter/victim are the steam64 id of the player if applicable,
// otherwise the field is undefined. Team is the team slot that the message is associated with
// (may not be a player, could be an ai or structure). If a player owns AI or structures
// they will have the same team slot as the player.
//
// Given a damage event in-game, a damage dealt and received event will be recorded that represent
// two sides of the same event

message DamageDealt {
  uint32 tick = 1;
  uint64 shooter = 2; // undefined if not a player
  int32 team = 3;
  string ordnance_odf = 4; // undefined for environmental damage (water, other unknown sources)
  float amount = 5;
}

message DamageReceived {
  uint32 tick = 1;
  uint64 victim = 2; // undefined if not a player
  int32 team = 3;
  string ordnance_odf = 4; // undefined for environmental damage (water, other unknown sources) 
  float amount = 5;
}

message PlayerState {
  uint64 player = 1;
  Vec3 position = 2;
  float speed = 3;
  float health = 4; // Actual hp values not ratio
  float ammo = 5;   // Same as health
  string odf = 6;
  bool has_target = 7; // are they using the T key?
}

message UpdateTick {
  uint32 tick = 1;
  repeated PlayerState players = 2;
}

message UnitDestroyed {
  uint32 tick = 1;

  uint64 killer = 2; // undefined if killer was not a player
  uint32 killer_team = 3;
  string killer_odf = 4;

  uint64 victim = 5; // undefined if victim was not a player
  uint32 victim_team = 6;
  string victim_odf = 7;
}

// Shooter and undefined if they are not players, this is probably rare but it might occur in mods that use
// sniping ai, or projectiles that are sniper shells with travel time (shooter might be dead)
message UnitSniped {
  uint32 tick = 1;

  uint64 shooter = 2;
  uint32 shooter_team = 3;
  string shooter_odf = 4;

  uint64 victim = 5;
  uint32 victim_team = 6;
  string victim_odf = 7;
}

// This detects pod and crate pickups
message PickupPowerup {
  uint32 tick = 1;

  uint64 picker = 2; // if an AI picks up the powerup this is undefined
  uint32 picker_team = 3;
  string picker_odf = 4;

  uint32 powerup_team = 5; // the team that owns the powerup
  string powerup_odf = 6;
}

message StatEvent {
  oneof event_type {
    BulletInit bullet_init = 1;
    BulletHit bullet_hit = 2;
    DamageDealt damage_dealt = 3;
    DamageReceived damage_received = 4;
    UpdateTick update_tick = 5;
    UnitDestroyed unit_destroyed = 6;
    UnitSniped unit_sniped = 7;
    PickupPowerup pickup_powerup = 8;
  }
}

message ClientStatSession {
  StatHeader header = 1;
  repeated StatEvent event_stream = 2;
}
